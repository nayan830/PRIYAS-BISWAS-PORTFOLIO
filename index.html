<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading…</title><!-- title injected by JS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ════════════════════════════════════
     DESIGN TOKENS
  ════════════════════════════════════ */
  :root {
    --bg-deep:    #04080f;
    --bg-mid:     #0b1626;
    --accent:     #5b8dee;
    --gold:       #f0b429;
    --text-light: #dce7f7;
    --dark:       #020609;
    --white:      #fff;
    --glow-blue:  rgba(91,141,238,0.22);
    --glow-gold:  rgba(240,180,41,0.25);
    --card-bg:    #0d1e35;
    --border:     rgba(220,231,247,0.10);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text-light);
    overflow-x: hidden;
  }

  /* Stars bg */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(220,231,247,0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(220,231,247,0.35) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 15%, rgba(240,180,41,0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 80%, rgba(220,231,247,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 35%, rgba(220,231,247,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 85%, rgba(220,231,247,0.25) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 65% 50%, rgba(91,141,238,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 92%, rgba(220,231,247,0.3) 0%, transparent 100%);
    pointer-events: none;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 22px 60px;
    background: rgba(4,8,15,0.94);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; color: var(--text-light); text-decoration: none;
    letter-spacing: 0.02em;
  }
  .logo-star { color: var(--accent); font-size: 1.1rem; }
  .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
  .nav-links a {
    color: var(--text-light); text-decoration: none; font-size: 0.88rem;
    font-weight: 400; letter-spacing: 0.04em; opacity: 0.75;
    transition: opacity 0.2s, color 0.2s;
  }
  .nav-links a:hover { opacity: 1; color: var(--gold); }
  .nav-cta {
    background: var(--gold) !important; color: var(--dark) !important;
    padding: 10px 22px; border-radius: 50px;
    font-weight: 500 !important; opacity: 1 !important;
  }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    background: linear-gradient(135deg, #04080f 0%, #081220 50%, #060d1a 100%);
    display: grid; grid-template-columns: 1fr 1fr;
    align-items: center; padding: 140px 60px 80px;
    position: relative; overflow: hidden;
  }
  #hero::after {
    content: '';
    position: absolute; top: -20%; right: -10%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(91,141,238,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-bg-text {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'Playfair Display', serif;
    font-size: clamp(100px,16vw,200px); font-weight: 900;
    color: transparent; -webkit-text-stroke: 1px rgba(91,141,238,0.06);
    white-space: nowrap; user-select: none; pointer-events: none;
    letter-spacing: -0.02em; line-height: 1;
  }
  .hero-left { position: relative; z-index: 2; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: var(--white);
    padding: 7px 16px; border-radius: 50px;
    font-size: 0.78rem; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 28px;
    box-shadow: 0 0 20px var(--glow-blue);
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px,6vw,82px);
    color: var(--text-light); line-height: 1.05;
    font-weight: 900; letter-spacing: -0.02em; margin-bottom: 20px;
  }
  .hero-title em { color: var(--gold); font-style: italic; }
  .hero-tagline {
    font-size: 1rem; color: rgba(220,231,247,0.65);
    max-width: 380px; line-height: 1.7; margin-bottom: 40px; font-weight: 300;
  }
  .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--gold); color: var(--dark);
    padding: 14px 30px; border-radius: 50px;
    font-weight: 500; font-size: 0.9rem; text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 18px var(--glow-gold);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(240,180,41,0.45); }
  .btn-outline {
    background: transparent; color: var(--text-light);
    padding: 13px 28px; border-radius: 50px;
    border: 1.5px solid rgba(220,231,247,0.25);
    font-size: 0.9rem; text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .hero-stats {
    display: flex; gap: 40px; margin-top: 50px;
    padding-top: 30px; border-top: 1px solid var(--border);
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem; font-weight: 900; color: var(--gold);
    display: block; line-height: 1;
  }
  .stat-label { font-size: 0.78rem; color: rgba(220,231,247,0.5); margin-top: 4px; letter-spacing: 0.04em; }
  .hero-right {
    position: relative; z-index: 2;
    display: flex; justify-content: flex-end; align-items: center;
  }
  .photo-frame { position: relative; width: 320px; height: 400px; }
  .photo-bg {
    position: absolute; top: 20px; right: -20px;
    width: 280px; height: 360px;
    background: var(--accent); border-radius: 4px;
    opacity: 0.7; filter: blur(2px);
    box-shadow: 0 0 40px var(--glow-blue);
  }
  .photo-placeholder {
    position: absolute; top: 0; right: 0;
    width: 280px; height: 360px;
    background: linear-gradient(135deg, #0d1e35, #04080f);
    border-radius: 4px; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: 1.5px solid rgba(91,141,238,0.35);
    box-shadow: inset 0 0 40px rgba(91,141,238,0.08);
  }
  .photo-initials {
    font-family: 'Playfair Display', serif;
    font-size: 72px; font-weight: 900; color: var(--gold);
    opacity: 0.9; line-height: 1;
  }
  .photo-name-small {
    font-size: 0.75rem; color: rgba(220,231,247,0.5);
    letter-spacing: 0.15em; text-transform: uppercase; margin-top: 8px;
  }
  .photo-tag {
    position: absolute; bottom: -18px; left: -30px;
    background: var(--gold); color: var(--dark);
    padding: 8px 18px; border-radius: 50px;
    font-size: 0.78rem; font-weight: 500; white-space: nowrap;
    box-shadow: 0 4px 16px var(--glow-gold);
  }
  .photo-tag-2 {
    position: absolute; top: -16px; right: 20px;
    background: var(--dark); color: var(--text-light);
    padding: 8px 18px; border-radius: 50px;
    font-size: 0.78rem; font-weight: 400; white-space: nowrap;
    border: 1px solid var(--border);
  }
  .hero-socials {
    position: absolute; right: -50px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 16px; align-items: center;
  }
  .social-line { width: 1px; height: 40px; background: var(--border); }
  .social-link {
    color: rgba(220,231,247,0.5); font-size: 0.75rem;
    writing-mode: vertical-rl; text-decoration: none;
    letter-spacing: 0.1em; transition: color 0.2s;
  }
  .social-link:hover { color: var(--gold); }

  /* ── SCROLL INDICATOR ── */
  .scroll-indicator {
    display: flex; justify-content: center;
    margin-top: -28px; position: relative; z-index: 10;
  }
  .scroll-btn {
    width: 80px; height: 80px; background: var(--gold);
    border-radius: 50%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 500; color: var(--dark);
    letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer; text-decoration: none;
    animation: bounce 2s infinite;
    box-shadow: 0 8px 30px var(--glow-gold);
  }
  .scroll-btn span { display: block; text-align: center; line-height: 1.2; }
  .scroll-arrow { font-size: 1rem; margin-top: 3px; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  /* ── SECTION BASE ── */
  section { padding: 100px 60px; position: relative; z-index: 1; }
  .section-label {
    display: inline-block; font-size: 0.72rem; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px,4.5vw,58px);
    font-weight: 900; line-height: 1.1; letter-spacing: -0.02em;
  }

  /* ── ABOUT ── */
  #about { background: linear-gradient(180deg, #04080f, #060e1c); }
  #about .section-title { color: var(--text-light); }
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center; margin-top: 60px;
  }
  .about-text p {
    font-size: 1rem; line-height: 1.8; color: rgba(220,231,247,0.7);
    margin-bottom: 20px; font-weight: 300;
  }
  .about-text p strong { color: var(--text-light); font-weight: 500; }
  .contact-card {
    background: var(--card-bg); color: var(--text-light);
    border-radius: 16px; padding: 36px; margin-top: 32px;
    border: 1px solid var(--border);
    box-shadow: 0 0 30px rgba(91,141,238,0.07);
  }
  .contact-card h4 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; margin-bottom: 20px; color: var(--gold);
  }
  .contact-item {
    display: flex; align-items: center; gap: 12px;
    font-size: 0.88rem; margin-bottom: 12px;
    color: rgba(220,231,247,0.8);
  }
  .contact-icon { color: var(--accent); font-size: 1rem; min-width: 20px; }
  .about-image-wrap { position: relative; }
  .about-img-bg {
    position: absolute; top: 20px; left: 20px;
    width: calc(100% - 20px); height: calc(100% - 20px);
    background: var(--bg-mid); border-radius: 8px;
    box-shadow: 0 0 40px rgba(91,141,238,0.1);
  }
  .about-img-placeholder {
    position: relative; z-index: 1;
    background: linear-gradient(135deg, #0d1e35, #04080f);
    border-radius: 8px; height: 420px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    border: 1.5px solid rgba(91,141,238,0.25); overflow: hidden;
  }
  .about-img-placeholder .big-initial {
    font-family: 'Playfair Display', serif;
    font-size: 100px; color: var(--accent); opacity: 0.12;
    font-weight: 900; line-height: 1;
  }
  .about-img-label {
    font-size: 0.75rem; letter-spacing: 0.12em;
    color: var(--accent); text-transform: uppercase; font-weight: 500;
  }

  /* ── EXPERIENCE ── */
  #experience { background: linear-gradient(180deg, #060e1c, #0b1626); }
  #experience .section-title { color: var(--text-light); }
  #experience .section-label { color: var(--gold); }
  .exp-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; margin-top: 50px; }
  .exp-card {
    background: var(--gold); border-radius: 16px; padding: 36px 30px;
    box-shadow: 0 8px 32px var(--glow-gold);
  }
  .exp-role {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; font-weight: 700; color: var(--dark); margin-bottom: 8px;
  }
  .exp-type {
    font-size: 0.8rem; color: rgba(0,0,0,0.55);
    font-weight: 500; letter-spacing: 0.05em;
    text-transform: uppercase; margin-bottom: 18px;
  }
  .exp-desc { font-size: 0.88rem; color: rgba(0,0,0,0.7); line-height: 1.7; }
  .exp-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
  .tag {
    background: rgba(0,0,0,0.12); color: var(--dark);
    padding: 5px 14px; border-radius: 50px;
    font-size: 0.75rem; font-weight: 500;
  }
  .process-list { margin-top: 50px; }
  .process-item {
    display: grid; grid-template-columns: 56px 1fr;
    gap: 24px; align-items: start;
    padding: 28px 0; border-top: 1px solid var(--border);
  }
  .process-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; color: var(--gold); font-weight: 900; line-height: 1;
  }
  .process-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; color: var(--text-light); margin-bottom: 6px;
  }
  .process-desc { font-size: 0.88rem; color: rgba(220,231,247,0.55); line-height: 1.6; }

  /* ── SKILLS ── */
  #skills { background: linear-gradient(180deg, #0b1626, #04080f); }
  #skills .section-title { color: var(--text-light); }
  .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; margin-top: 50px; }
  .skill-group-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; color: var(--gold);
  }
  .skill-item { margin-bottom: 18px; }
  .skill-name {
    display: flex; justify-content: space-between;
    font-size: 0.88rem; font-weight: 500; margin-bottom: 8px; color: var(--text-light);
  }
  .skill-bar {
    height: 6px; background: rgba(220,231,247,0.08); border-radius: 3px; overflow: hidden;
  }
  .skill-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 3px; transform-origin: left; transition: width 1.2s ease;
    box-shadow: 0 0 8px var(--glow-blue);
  }
  .skill-tags-wrap { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
  .skill-tag {
    background: var(--card-bg); color: var(--text-light);
    padding: 8px 18px; border-radius: 50px;
    font-size: 0.8rem; border: 1px solid var(--border);
    transition: border-color 0.2s, color 0.2s;
  }
  .skill-tag:hover { border-color: var(--accent); color: var(--accent); }

  /* ── EDUCATION ── */
  #education { background: linear-gradient(180deg, #04080f, #060e1c); }
  #education .section-title { color: var(--text-light); }
  #education .section-label { color: var(--gold); }
  .edu-list { margin-top: 50px; }
  .edu-item {
    display: grid; grid-template-columns: 100px 1fr;
    gap: 30px; padding: 30px 0;
    border-top: 1px solid var(--border); align-items: start;
  }
  .edu-year {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem; color: var(--gold);
    letter-spacing: 0.05em; padding-top: 4px;
  }
  .edu-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem; color: var(--text-light);
    font-weight: 700; margin-bottom: 5px;
  }
  .edu-degree { font-size: 0.88rem; color: rgba(220,231,247,0.55); line-height: 1.5; }

  /* ── EXTRAS ── */
  #extras { background: linear-gradient(180deg, #060e1c, #0b1626); }
  #extras .section-title { color: var(--text-light); }
  .extras-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; margin-top: 50px; }
  .lang-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 24px; }
  .lang-card {
    background: var(--card-bg); color: var(--text-light);
    border-radius: 12px; padding: 20px 16px; text-align: center;
    border: 1px solid var(--border);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .lang-card:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--glow-blue); }
  .lang-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; margin-bottom: 5px; }
  .lang-level { font-size: 0.75rem; color: var(--gold); }
  .hobby-list { margin-top: 24px; display: flex; flex-wrap: wrap; gap: 10px; }
  .hobby-item {
    background: var(--card-bg); color: var(--text-light);
    padding: 9px 20px; border-radius: 50px;
    font-size: 0.82rem; border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .hobby-item:hover { border-color: var(--gold); }

  /* ── CONTACT ── */
  #contact { background: linear-gradient(180deg, #0b1626, #04080f); }
  #contact .section-title { color: var(--text-light); }
  #contact .section-label { color: var(--gold); }
  .contact-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; margin-top: 50px; align-items: center;
  }
  .contact-left p {
    font-size: 1rem; line-height: 1.8; color: rgba(220,231,247,0.65);
    margin-bottom: 32px; font-weight: 300;
  }
  .contact-details { display: flex; flex-direction: column; gap: 14px; }
  .contact-detail-item {
    display: flex; align-items: center; gap: 14px;
    font-size: 0.9rem; color: rgba(220,231,247,0.8);
  }
  .cd-icon {
    width: 40px; height: 40px; background: var(--card-bg);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0; border: 1px solid var(--border);
  }
  .contact-right {
    background: var(--card-bg); border-radius: 20px; padding: 48px;
    border: 1px solid var(--border);
    box-shadow: 0 0 40px rgba(91,141,238,0.08);
  }
  .contact-right h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; color: var(--text-light); margin-bottom: 30px;
  }
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block; font-size: 0.78rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(220,231,247,0.5); margin-bottom: 8px;
  }
  .form-group input, .form-group textarea {
    width: 100%; background: rgba(220,231,247,0.05);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    color: var(--text-light); font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; outline: none; transition: border-color 0.2s; resize: vertical;
  }
  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 10px var(--glow-blue);
  }
  .form-group textarea { height: 110px; }

  /* ── FOOTER ── */
  footer {
    background: #020609; color: rgba(220,231,247,0.4);
    text-align: center; padding: 28px 60px;
    font-size: 0.8rem; display: flex;
    justify-content: space-between; align-items: center;
    border-top: 1px solid var(--border);
  }
  .footer-logo { font-family: 'Playfair Display', serif; color: var(--text-light); font-size: 1rem; }
  .footer-logo span { color: var(--accent); }

  /* ── TICKER ── */
  .ticker-strip {
    background: #020609; padding: 16px 0;
    overflow: hidden; white-space: nowrap;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .ticker-inner { display: inline-flex; gap: 60px; animation: ticker 20s linear infinite; }
  .ticker-item {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem; color: rgba(220,231,247,0.4);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .ticker-sep { color: var(--accent); margin: 0 60px 0 0; }
  @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* ── CUSTOM CURSOR ── */
  * { cursor: none !important; }
  #cursor-ring {
    position: fixed; top: 0; left: 0; z-index: 9999;
    width: 36px; height: 36px;
    border: 2px solid var(--gold); border-radius: 50%;
    pointer-events: none; transform: translate(-50%,-50%);
    transition: width .25s ease, height .25s ease,
                border-color .25s ease, background .2s ease, opacity .3s ease;
    mix-blend-mode: difference;
  }
  #cursor-dot {
    position: fixed; top: 0; left: 0; z-index: 10000;
    width: 7px; height: 7px; background: var(--gold);
    border-radius: 50%; pointer-events: none;
    transform: translate(-50%,-50%);
    transition: transform .08s ease, background .2s ease;
  }
  #cursor-ring.hovering { width: 58px; height: 58px; background: rgba(240,180,41,0.1); border-color: var(--accent); }
  #cursor-ring.clicking { width: 28px; height: 28px; background: rgba(240,180,41,0.25); }
  #cursor-dot.clicking  { transform: translate(-50%,-50%) scale(0.5); }

  /* ── BIRD CURSOR ── */
  #bird-cursor {
    position: fixed; top: 0; left: 0; z-index: 9998;
    pointer-events: none; transform: translate(-50%,-50%);
    width: 38px; height: 22px;
    transition: opacity 0.3s ease;
  }
  @keyframes wingFlap {
    0%   { d: path("M19 11 Q10 2  0 9  Q10 14 19 11 Q28 8  38 9  Q28 2  19 11"); }
    25%  { d: path("M19 11 Q10 5  0 11 Q10 15 19 11 Q28 7  38 11 Q28 5  19 11"); }
    50%  { d: path("M19 11 Q10 9  0 13 Q10 16 19 11 Q28 6  38 13 Q28 9  19 11"); }
    75%  { d: path("M19 11 Q10 5  0 11 Q10 15 19 11 Q28 7  38 11 Q28 5  19 11"); }
    100% { d: path("M19 11 Q10 2  0 9  Q10 14 19 11 Q28 8  38 9  Q28 2  19 11"); }
  }
  #bird-body {
    animation: wingFlap 0.55s ease-in-out infinite;
    fill: none; stroke: var(--gold);
    stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    nav { padding: 18px 24px; }
    .nav-links { gap: 16px; }
    section { padding: 70px 24px; }
    #hero { grid-template-columns: 1fr; padding: 120px 24px 60px; gap: 50px; }
    .hero-right { justify-content: center; }
    .hero-socials { display: none; }
    .about-grid, .contact-grid, .skills-grid, .extras-grid { grid-template-columns: 1fr; gap: 40px; }
    .exp-grid { grid-template-columns: 1fr; }
    footer { flex-direction: column; gap: 10px; text-align: center; }
  }
</style>
</head>
<body>

<!-- ─── CUSTOM CURSOR ─── -->
<div id="cursor-ring"></div>
<div id="cursor-dot"></div>

<!-- ─── BIRD CURSOR ─── -->
<div id="bird-cursor">
  <svg viewBox="0 0 38 22" xmlns="http://www.w3.org/2000/svg" width="38" height="22">
    <path id="bird-body"
      d="M19 11 Q10 2  0 9  Q10 14 19 11 Q28 8  38 9  Q28 2  19 11"
      fill="none" stroke="#f0b429" stroke-width="2.2"
      stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="21.5" cy="10" r="1.2" fill="#f0b429"/>
    <path d="M19 11 L14 14 M19 11 L12 12.5" stroke="#f0b429" stroke-width="1.4"
      stroke-linecap="round" opacity="0.7"/>
  </svg>

  <div class="about-grid">

<section id="contact">

<!-- ════════════════════════════════════
     DATA LOADER  — reads data.json
════════════════════════════════════ -->
<script>
async function loadSite() {
  /* ── Fetch data.json (place it in the same folder as this HTML) ── */
  const res  = await fetch('data.json');
  const d    = await res.json();

  /* ─────────────────── helpers ─────────────────── */
  const el  = id => document.getElementById(id);
  const set = (id, html) => { if (el(id)) el(id).innerHTML = html; };

  /* ─────────────────── <title> & meta ────────────── */
  document.title = d.site.pageTitle;

  /* ─────────────────── NAV ──────────────────────── */
  el('nav-logo').innerHTML =
    `<span class="logo-star">${d.site.logoStar}</span> ${d.site.logoText}`;

  el('nav-links').innerHTML = d.nav.links.map(l =>
    `<li><a href="${l.href}" ${l.cta ? 'class="nav-cta"' : ''}>${l.text}</a></li>`
  ).join('');

  /* ─────────────────── HERO ─────────────────────── */
  set('hero-bg-text',   d.hero.bgText);
  set('hero-badge',     d.hero.badge);

  el('hero-title').innerHTML =
    `${d.hero.titleLine1}<br><em>${d.hero.titleEm}</em>`;

  set('hero-tagline',   d.hero.tagline);

  el('hero-btns').innerHTML = d.hero.buttons.map(b =>
    `<a href="${b.href}" class="btn-${b.type}">${b.text}</a>`
  ).join('');

  el('hero-stats').innerHTML = d.hero.stats.map(s =>
    `<div>
      <span class="stat-num">${s.num}</span>
      <div class="stat-label">${s.label}</div>
    </div>`
  ).join('');

  set('hero-initials',    d.hero.photo.initials);
  set('hero-photo-name',  d.hero.photo.name);
  set('hero-tag-bottom',  d.hero.photo.tagBottom);
  set('hero-tag-top',     d.hero.photo.tagTop);

  el('hero-socials').innerHTML =
    `<div class="social-line"></div>` +
    d.hero.socials.map(s =>
      `<a class="social-link" href="${s.href}">${s.text}</a>`
    ).join('<div class="social-line"></div>') +
    `<div class="social-line"></div>`;

  /* ─────────────────── ABOUT ────────────────────── */
  set('about-label', d.about.sectionLabel);
  el('about-title').innerHTML = d.about.title.replace('\n', '<br>');

  el('about-paragraphs').innerHTML = d.about.paragraphs.map(p =>
    `<p>${p}</p>`
  ).join('');

  set('contact-card-title', d.about.contactCard.title);
  el('contact-card-items').innerHTML = d.about.contactCard.items.map(i =>
    `<div class="contact-item">
      <span class="contact-icon">${i.icon}</span> ${i.text}
    </div>`
  ).join('');

  set('about-img-initial', d.about.imagePlaceholder.initial);
  set('about-img-label',   d.about.imagePlaceholder.label);

  /* ─────────────────── TICKER ───────────────────── */
  /* double the array so seamless loop works */
  const tickerItems = [...d.ticker, ...d.ticker];
  el('ticker-inner').innerHTML = tickerItems.map(t =>
    `<span class="ticker-item">${t} <span class="ticker-sep">✦</span></span>`
  ).join('');

  /* ─────────────────── EXPERIENCE ───────────────── */
  set('exp-label',    d.experience.sectionLabel);
  el('exp-title').innerHTML = d.experience.title.replace('\n', '<br>');

  el('exp-cards').innerHTML = d.experience.cards.map(c =>
    `<div class="exp-card">
      <div class="exp-role">${c.role}</div>
      <div class="exp-type">${c.type}</div>
      <p class="exp-desc">${c.desc}</p>
      <div class="exp-tags">${c.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>`
  ).join('');

  set('process-label', d.experience.processLabel);
  el('process-items').innerHTML = d.experience.process.map(p =>
    `<div class="process-item">
      <div class="process-num">${p.num}</div>
      <div>
        <div class="process-title">${p.title}</div>
        <div class="process-desc">${p.desc}</div>
      </div>
    </div>`
  ).join('');

  /* ─────────────────── SKILLS ───────────────────── */
  set('skills-label',      d.skills.sectionLabel);
  set('skills-title',      d.skills.title);
  set('skills-core-label', d.skills.coreLabel);
  set('skills-tools-label',d.skills.toolsLabel);

  el('skills-core-list').innerHTML = d.skills.coreSkills.map(s =>
    `<div class="skill-item">
      <div class="skill-name">
        <span>${s.name}</span><span>${s.pct}%</span>
      </div>
      <div class="skill-bar">
        <div class="skill-fill" style="width:${s.pct}%"></div>
      </div>
    </div>`
  ).join('');

  el('skills-tools-list').innerHTML = d.skills.tools.map(t =>
    `<span class="skill-tag">${t}</span>`
  ).join('');

  /* ─────────────────── EDUCATION ────────────────── */
  set('edu-label', d.education.sectionLabel);
  set('edu-title', d.education.title);

  el('edu-list').innerHTML = d.education.items.map(i =>
    `<div class="edu-item">
      <div class="edu-year">${i.year}</div>
      <div>
        <div class="edu-name">${i.name}</div>
        <div class="edu-degree">${i.degree}</div>
      </div>
    </div>`
  ).join('');

  /* ─────────────────── EXTRAS ────────────────────── */
  set('extras-label', d.extras.sectionLabel);
  el('extras-title').innerHTML = d.extras.title.replace('\n', '<br>');
  set('lang-label',   d.extras.langLabel);
  set('hobby-label',  d.extras.hobbyLabel);

  el('lang-grid').innerHTML = d.extras.languages.map(l =>
    `<div class="lang-card">
      <div class="lang-name">${l.name}</div>
      <div class="lang-level">${l.level}</div>
    </div>`
  ).join('');

  el('hobby-list').innerHTML = d.extras.hobbies.map(h =>
    `<span class="hobby-item">${h}</span>`
  ).join('');

  /* ─────────────────── CONTACT ───────────────────── */
  set('contact-label',     d.contact.sectionLabel);
  set('contact-title',     d.contact.title);
  set('contact-intro',     d.contact.intro);
  set('contact-form-title',d.contact.form.title);

  el('contact-details').innerHTML = d.contact.details.map(i =>
    `<div class="contact-detail-item">
      <div class="cd-icon">${i.icon}</div>
      <div>${i.text}</div>
    </div>`
  ).join('');

  el('form-name').placeholder    = d.contact.form.namePlaceholder;
  el('form-email').placeholder   = d.contact.form.emailPlaceholder;
  el('form-message').placeholder = d.contact.form.messagePlaceholder;

  const submitBtn = el('contact-submit');
  submitBtn.textContent = d.contact.form.submitText;
  submitBtn.href        = `mailto:${d.contact.form.submitEmail}`;

  /* ─────────────────── FOOTER ────────────────────── */
  el('footer-logo').innerHTML =
    `${d.footer.logoStar} <span>${d.footer.logoName}</span> ${d.footer.logoSurname}`;
  set('footer-copy',     d.footer.copyright);
  set('footer-location', d.footer.location);

  /* ─────────────────── RE-ATTACH INTERACTIONS ──────
     (hover cursor targets may have changed after render)     */
  attachInteractions();
}

/* ════════════════════════════════════
   CURSOR + BIRD
════════════════════════════════════ */
const ring = document.getElementById('cursor-ring');
const dot  = document.getElementById('cursor-dot');
const bird = document.getElementById('bird-cursor');

let ringX = 0, ringY = 0;
let birdFollowX = 0, birdFollowY = 0;
let mouseX = 0, mouseY = 0;
let bobPhase = 0;
let idleTimer = null;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  dot.style.left = mouseX + 'px';
  dot.style.top  = mouseY + 'px';
  ring.style.opacity = dot.style.opacity = bird.style.opacity = '1';
  bird.classList.remove('idle');
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => bird.classList.add('idle'), 1800);
});

(function animateRing() {
  ringX += (mouseX - ringX) * 0.12;
  ringY += (mouseY - ringY) * 0.12;
  ring.style.left = ringX + 'px';
  ring.style.top  = ringY + 'px';
  requestAnimationFrame(animateRing);
})();

(function animateBird() {
  bobPhase += 0.04;
  const bobY = Math.sin(bobPhase) * 4;
  const bobX = Math.sin(bobPhase * 0.5) * 2;
  birdFollowX += (mouseX - birdFollowX) * 0.07;
  birdFollowY += (mouseY - birdFollowY) * 0.07;
  bird.style.left = (birdFollowX + 22 + bobX) + 'px';
  bird.style.top  = (birdFollowY - 26 + bobY)  + 'px';
  const vx = mouseX - birdFollowX;
  const vy = mouseY - birdFollowY;
  const speed  = Math.sqrt(vx*vx + vy*vy);
  const tilt   = Math.max(-18, Math.min(18, vy * 0.15));
  const scaleX = vx < -2 ? -1 : 1;
  bird.style.transform = `translate(-50%,-50%) scaleX(${scaleX}) rotate(${tilt}deg)`;
  const flapDur = speed > 8 ? '0.35s' : speed > 3 ? '0.55s' : '1.3s';
  bird.querySelector('#bird-body').style.animationDuration = flapDur;
  requestAnimationFrame(animateBird);
})();

document.addEventListener('mousedown', () => { ring.classList.add('clicking'); dot.classList.add('clicking'); });
document.addEventListener('mouseup',   () => { ring.classList.remove('clicking'); dot.classList.remove('clicking'); });
document.addEventListener('mouseleave',() => { ring.style.opacity = dot.style.opacity = bird.style.opacity = '0'; });
document.addEventListener('mouseenter',() => { ring.style.opacity = dot.style.opacity = bird.style.opacity = '1'; });

/* ════════════════════════════════════
   INTERACTIONS (called after render)
════════════════════════════════════ */
function attachInteractions() {
  /* Smooth scroll */
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      document.querySelector(a.getAttribute('href'))?.scrollIntoView({ behavior: 'smooth' });
    });
  });

  /* Cursor hover */
  const hoverSel = 'a, button, input, textarea, .exp-card, .lang-card, .hobby-item, .skill-tag, .btn-primary, .btn-outline, .nav-cta';
  document.querySelectorAll(hoverSel).forEach(el => {
    el.addEventListener('mouseenter', () => ring.classList.add('hovering'));
    el.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
  });

  /* Fade-in sections */
  const fadeObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.style.opacity = '1';
        e.target.style.transform = 'translateY(0)';
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.exp-card, .edu-item, .process-item, .lang-card').forEach(el => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(20px)';
    el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    fadeObs.observe(el);
  });
}

/* ── Kick everything off ── */
loadSite().catch(err => {
  console.error('Could not load data.json:', err);
  document.body.innerHTML = `
    <div style="display:grid;place-items:center;height:100vh;font-family:sans-serif;color:#f0b429;background:#04080f;text-align:center;padding:2rem">
      <div>
        <h2 style="font-size:2rem;margin-bottom:1rem">⚠️ data.json not found</h2>
        <p style="opacity:.7">Make sure <strong>data.json</strong> is in the same folder as <strong>index.html</strong> and open this page via a local server (not file://).</p>
      </div>
    </div>`;
});
</script>
</body>
